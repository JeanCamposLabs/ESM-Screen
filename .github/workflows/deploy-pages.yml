name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; never cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (+ stamp version for auto-refresh)
        run: |
          mkdir -p _site/assets
          cp index.html styles.css app.js _site/
          cp -r assets/. _site/assets/ 2>/dev/null || true
          python3 - <<'PY'
          import os, json
          d = '_site/assets/slides'
          imgs = [f"assets/slides/{f}" for f in sorted(os.listdir(d))] if os.path.isdir(d) else []
          imgs = [p for p in imgs if p.lower().endswith(('.jpg', '.jpeg', '.png', '.webp'))]
          json.dump(imgs, open('_site/assets/backgrounds.json', 'w'))
          print('backgrounds.json ->', imgs)
          PY
          cat > _site/version.json <<EOF
          {
            "version": "$(date -u +%Y.%m.%d)-${GITHUB_SHA::7}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "note": "Auto-stamped on deploy. The screen reloads when this changes."
          }
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
